name: N1 E2E Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        run: |
          if [ -z "$E2E_USER_EMAIL" ] || [ -z "$E2E_USER_PASSWORD" ]; then
            echo "E2E_USER_EMAIL and E2E_USER_PASSWORD secrets are required."
            exit 1
          fi
          if [ -z "$E2E_BASE_URL" ]; then
            echo "E2E_BASE_URL is not set. Falling back to https://birader.app"
            echo "E2E_BASE_URL=https://birader.app" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        run: npm run test:e2e
